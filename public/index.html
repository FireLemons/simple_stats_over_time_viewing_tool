<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>Timeline</title>
  <script src="js/chart.umd.js"></script>
  <script src="js/json5.js"></script>
  <script>
    let jsonInputTextarea
    let messageDisplayParagraph
    const logLevels = new Set(['fail', 'info', 'warn'])

    function cleanData () {
      // TODO
    }

    function messageUser (message, level) {
      if (!logLevels.has(level)) {
        console.error(`unsupported log level ${level}`)

        return
      }

      if (!(messageDisplayParagraph instanceof HTMLElement)) {
        console.error('reference to message display element is not instance of HTMLElement. Value is instead:')
        console.error(messageDisplayParagraph)

        return
      }

      messageDisplayParagraph.className = level
      messageDisplayParagraph.innerHTML = message
    }

    function parseInput () {
      if (!(jsonInputTextarea instanceof HTMLElement)) {
        messageUser('Failed to access element containing json', 'fail')

        console.error('reference to json editing element is not instance of HTMLElement. Value is instead:')
        console.error(jsonInputTextarea)

        return
      }

      try {
        const parsedObject = JSON5.parse(jsonInputTextarea.value)

        messageUser('', 'info')
        
        return parsedObject
      } catch (e) {
        messageUser('failed to parse input as json5', 'fail')
      }
    }

    function updateGraph () {
      // TODO
    }

    window.addEventListener('load', function () {
      messageDisplayParagraph = document.getElementById('message')
      jsonInputTextarea = document.querySelector('#data-input textarea')

      const json5Hint = document.querySelector('#data-input a')

      json5Hint.addEventListener("click", function () {
        messageUser('json5 means you can use javascript syntax to define your json', 'info')
      })

      jsonInputTextarea.addEventListener('input', function (event) {
        parseInput()
      })

      jsonInputTextarea.style.height = jsonInputTextarea.scrollHeight + 'px'
    })
  </script>
  <style>
    body {
      background-color: #1b5e20;
      margin: 0;
    }

    p {
      color: white;
      padding: 0 1em;
    }

    #app {
      display: inline-block;

      width: 100vw;
      height: 100vh;
    }

    #data-input textarea {
      width: -moz-available;
      width: -webkit-fill-available;
    }

    #data-input a {
      cursor: help;
      color: #4caf50;
    }

    #message.fail {
      color: #ef9a9a;
    }

    #message.warn {
      color: #ffa726;
    }
  </style>
</head>
  <body>
    <div id="app">
      <div id="chart">

      </div>
      <div id="data-input">
        <p>Enter an array of objects where all values are numeric in <a href="#">json5</a> format</p>
        <p id="message"></p>
        <textarea>
[
  {
    a: 0,
    b: 0,
    c: 1
  },
  {
    a: 1,
    b: 4,
    c: 3
  },
  {
    a: 2,
    b: 2,
    c: 9
  },
]
        </textarea>
      </div>
    </div>
  </body>
</html>
