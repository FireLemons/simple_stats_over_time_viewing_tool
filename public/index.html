<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>Timeline</title>
  <script src="js/ace.js"></script>
  <script src="js/mode-json5.js"></script>
  <script src="js/theme-dracula.js"></script>

  <script src="js/chart.umd.js"></script>
  <script src="js/json5.js"></script>
  <script>
    const chartDefaultColor = '#212121'
    const logLevels = new Set(['fail', 'info', 'warn'])

    let chart
    let jsonEditor
    let messageDisplayParagraph

    function cleanInputData (uncleanedArray) {
      const cleanedArray = structuredClone(uncleanedArray)
      let hasPruned = false
      const labelArray = []

      for (let i = cleanedArray.length - 1; i >= 0; i--) {
        let currentElement = cleanedArray[i]
        let currentLabel = ''

        if (Array.isArray(currentElement)) {
          if (currentElement < 2 || !(typeof currentElement[0] === 'string' || currentElement[0] instanceof String) || typeof currentElement[1] !== 'object') {
            console.warn(`Element at index ${i} is not the correct format of a labal, datapoint tuple. Label datapoint tuples are in the form ['string', { keys: 0, ... }]`)
          } else {
            currentLabel = currentElement[0]
            cleanedArray[i] = currentElement = currentElement[1]
          }
        }

        if (typeof currentElement !== 'object') {
          console.warn(`Element at index ${i} did not contain a datapoint object. Removing`)
          cleanedArray.splice(i, 1)
          hasPruned = true
        } else {
          for (let [key, value] of Object.entries(currentElement)) {
            if (typeof value !== 'number') {
              console.warn(`Value of key "${key}" of object at index ${i} is not a number. Removing`)
              delete currentElement[key]
              hasPruned = true
            }
          }

          if (Object.keys(currentElement).length === 0) {
            console.warn(`Element at index ${i} is an empty object. Removing`)
            cleanedArray.splice(i, 1)
            hasPruned = true
          } else {
            labelArray.push(currentLabel)
          }
        }
      }

      return {
        cleanedArray,
        hasPruned,
        labelArray: labelArray.reverse()
      }
    }

    function formatCleanedChartData (cleanedData) {
      const completeObject = getObjectContainingAllKeys(cleanedData)
      const groupedValuesContainer =  mergeObjectsPure(completeObject, cleanedData[0])

      for (let [key, value] of Object.entries(groupedValuesContainer)) {
        groupedValuesContainer[key] = [value]
      }

      cleanedData.slice(1).reduce((accumulator, object) => {
        const currentCompleteObject = mergeObjectsPure(completeObject, object)

        for (let key in currentCompleteObject) {
          accumulator[key].push(currentCompleteObject[key])
        }

        return accumulator
      }, groupedValuesContainer)

      const dataFormattedAsDatasets = []

      for (let key in groupedValuesContainer) {
        dataFormattedAsDatasets.push({
          label: key,
          data: groupedValuesContainer[key]
        })
      }

      return dataFormattedAsDatasets
    }

    function getDefaultChartLabels (labelCount) {
      return Array(labelCount).fill('')
    }

    function getObjectContainingAllKeys (objectArray) {
      return objectArray.reduce((accumulator, object) => {
        Object.keys(object).forEach(key => accumulator[key] = null)
        return accumulator
      }, {})
    }

    function initializeChart () {
      const ctx = document.getElementById('chart').getContext('2d')

      chart = new Chart(ctx, {
        type: 'line',
        data: { datasets: [] },
        options: {
          color: chartDefaultColor,
          scales: {
            x: {
              grid: {
                color: '#757575'
              },
              ticks: { 
                color: chartDefaultColor
              }
            },
            y: {
              grid: {
                color: '#757575'
              },
              ticks: {
                color: chartDefaultColor
              }
            }
          }
        }
      })
    }

    function initializeJSON5Hint () {
      const json5Hint = document.querySelector('#data-input a')

      json5Hint.addEventListener("click", function () {
        messageUser('json5 means you can use javascript object literal syntax to define your json. It\'s backwards compatible with standard json syntax', 'info')
      })
    }

    function initializeJSONEditor () {
      jsonEditor = ace.edit('json-editor')
      jsonEditor.setValue(
`[
  ['label', {
    a: 0,
    b: 0,
    c: 1
  }],
  {
    a: 1,
    b: 4,
    c: 3
  },
  {
    a: 2,
    b: 2
  }
]
`)
      jsonEditor.setOptions({
        maxLines: Infinity,
        minLines: 5,
        mode: "ace/mode/json5",
        tabSize: 2,
        theme: "ace/theme/dracula",
        useSoftTabs: true
      })

      jsonEditor.session.on('change', function() {
        processInput()
      })
    }

    function mergeObjectsPure (...objects) {
      return Object.assign({}, ...objects)
    }

    function messageUser (message, level) {
      if (!logLevels.has(level)) {
        console.error(`unsupported log level ${level}`)

        return
      }

      if (!(messageDisplayParagraph instanceof HTMLElement)) {
        console.error('reference to message display element is not instance of HTMLElement. Value is instead:')
        console.error(messageDisplayParagraph)

        return
      }

      messageDisplayParagraph.className = level
      messageDisplayParagraph.innerHTML = message
    }

    function parseInput (userInput) {
      if (!(typeof userInput === 'string' || userInput instanceof String)) {
        messageUser('Failed to recongnize json input as a string', 'fail')

        console.error('JSON input is not a sting. Value is instead:')
        console.error(userInput)

        return
      }

      try {
        const parsedObject = JSON5.parse(userInput)

        messageUser('', 'info')

        return parsedObject
      } catch (e) {
        messageUser('failed to parse input as json5', 'fail')
      }
    }

    function processInput () {
      console.log('Processing input')
      const userInput = jsonEditor.getValue()
      const parsedUserInput = parseInput(userInput)

      if (!validateUserInputIsArray(parsedUserInput)) {
        return
      }

      const cleanDataResult = cleanInputData(parsedUserInput)

      if (cleanDataResult.hasPruned) {
        if (cleanDataResult.cleanedArray.length === 0) {
          messageUser('Pruning off invalid input data resulted in no usable data', 'fail')
          return
        } else {
          messageUser('Some parts of the object were invalid so they were removed. Open the dev console(ctrl + shift + k on most browsers) for details.', 'warn')
        }
      }

      updateChart(formatCleanedChartData(cleanDataResult.cleanedArray), cleanDataResult.labelArray)
    }

    function updateChart (newData, newLabels) {
      chart.data.labels = newLabels
      chart.data.datasets = newData
      chart.update()
    }

    function validateUserInputIsArray (parsedUserInput) {
      if (!Array.isArray(parsedUserInput)) {
        messageUser('Parsed JSON is not an array', 'fail')

        return false
      } else if (parsedUserInput.length === 0){
        messageUser('Parsed JSON is an empty array', 'fail')

        return false
      }

      return true
    }

    window.addEventListener('load', function () {
      messageDisplayParagraph = document.getElementById('message')
      initializeJSON5Hint()
      initializeJSONEditor()
      initializeChart()
      processInput()
    })
  </script>
  <style>
    body {
      background-color: #1b5e20;
      margin: 0;
    }

    p {
      color: white;
      padding: 0 1em;
    }

    #app {
      display: inline-block;

      width: 100vw;
      height: 100vh;
    }

    #chart-container {
      background-color: #a5d6a7;
      display: flex;
      justify-content: center;
      max-height: 60vh;
    }

    #data-input textarea {
      width: -moz-available;
      width: -webkit-fill-available;
    }

    #data-input a {
      cursor: help;
      color: #4caf50;
    }

    #message.fail {
      color: #ef9a9a;
    }

    #message.warn {
      color: #ffa726;
    }
  </style>
</head>
  <body>
    <div id="app">
      <div id="chart-container">
        <canvas id="chart"></canvas>
      </div>
      <div id="data-input">
        <p>Enter an array of either an object where all values are numeric or a tuple of a label followed by the object where all values are numeric in <a href="#">json5</a> format</p>
        <p id="message"></p>
        <div id="json-editor">
        </div>
      </div>
    </div>
  </body>
</html>
